- id: '1762737154334'
  alias: 'Stairwell: Follow Middle + Smart Nightlight'
  description: 'Upper stair follows middle hallway; lower is a nightlight at 1% only
    when the middle is off. If middle is on at ≥30% both stair lights go 100%; if
    middle is on between 1–29% both go 30%.

    '
  triggers:
  - trigger: state
    entity_id: light.hue_white_lamp_hallway_middle
  - trigger: state
    entity_id: light.hue_candle_upper_staircase
    to: 'off'
  actions:
  - choose:
    - conditions:
      - condition: state
        entity_id: light.hue_white_lamp_hallway_middle
        state: 'on'
      - condition: template
        value_template: '{{ (state_attr(''light.hue_white_lamp_hallway_middle'',''brightness'')|int(0))
          >= 77 }}

          '
      sequence:
      - action: light.turn_on
        target:
          entity_id:
          - light.hue_candle_lower_staircase
          - light.hue_candle_upper_staircase
        data:
          color_temp: 450
          transition: 1
          brightness_pct: 3
    - conditions:
      - condition: state
        entity_id: light.hue_white_lamp_hallway_middle
        state: 'on'
      - condition: template
        value_template: '{% set b = state_attr(''light.hue_white_lamp_hallway_middle'',''brightness'')|int(0)
          %} {{ b > 0 and b < 77 }}

          '
      sequence:
      - action: light.turn_on
        target:
          entity_id:
          - light.hue_candle_lower_staircase
          - light.hue_candle_upper_staircase
        data:
          brightness_pct: 3
          color_temp: 450
          transition: 1
    - conditions:
      - condition: state
        entity_id: light.hue_white_lamp_hallway_middle
        state: 'off'
      sequence:
      - action: light.turn_off
        target:
          entity_id: light.hue_candle_upper_staircase
        data:
          transition: 1
      - action: light.turn_on
        target:
          entity_id: light.hue_candle_lower_staircase
        data:
          brightness_pct: 1
          color_temp: 450
          transition: 1
    default:
    - choose:
      - conditions:
        - condition: state
          entity_id: light.hue_white_lamp_hallway_middle
          state: 'off'
        sequence:
        - action: light.turn_on
          target:
            entity_id: light.hue_candle_lower_staircase
          data:
            brightness_pct: 1
            color_temp: 450
            transition: 1
  mode: single
