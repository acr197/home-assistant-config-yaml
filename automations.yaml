  alias: 'Nursery: Govee battery low or missing (6hr nag)'
  description: Alerts every 6 hours if Govee battery is <5% or state is null/unknown/unavailable.
  triggers:
  - hours: /6
    trigger: time_pattern
  - entity_id: sensor.govee_thermometer_nursery_h5104_battery
    below: 5
    for:
      minutes: 5
    trigger: numeric_state
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: or
        conditions:
        - condition: numeric_state
          entity_id: sensor.govee_thermometer_nursery_h5104_battery
          below: 5
        - condition: state
          entity_id: sensor.govee_thermometer_nursery_h5104_battery
          state: unknown
        - condition: state
          entity_id: sensor.govee_thermometer_nursery_h5104_battery
          state: unavailable
        - condition: template
          value_template: '{% set s = states(''sensor.govee_thermometer_nursery_h5104_battery'')
