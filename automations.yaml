- id: '1761791366230'
  alias: 'Nursery: Temperature Alerts (66/76 for 5m)'
  description: Alerts if nursery temp is too hot or too cold. Re-checks every 10 minutes
    and on HA start.
  triggers:
  - trigger: numeric_state
    id: too_cold
    entity_id: sensor.govee_thermometer_nursery_h5075_temperature
    below: 66
    for:
      minutes: 5
  - trigger: numeric_state
    id: too_hot
    entity_id: sensor.govee_thermometer_nursery_h5075_temperature
    above: 74
    for:
      minutes: 5
  - trigger: time_pattern
    id: periodic
    minutes: /10
  - trigger: homeassistant
    id: ha_start
    event: start
  conditions:
  - condition: device
    device_id: 54376091c5980b4a3ea7b981389db0df
    domain: media_player
    entity_id: b08609d1c4a650ea08bb26c14de1564b
    type: is_playing
  actions:
  - choose:
    - conditions:
      - condition: numeric_state
        entity_id: sensor.govee_thermometer_nursery_h5075_temperature
        above: 76
      sequence:
      - action: notify.mobile_app_andrews_s24
        data:
          title: Nursery Alert
          message: 'Nursery temperature is above 74°F (current: {{ states(''sensor.govee_thermometer_nursery_h5075_temperature'')
            }}).

            '
          data:
            ttl: 0
            priority: high
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.nursery_alert_cooldown
      - delay:
          minutes: 30
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.nursery_alert_cooldown
    - conditions:
      - condition: numeric_state
        entity_id: sensor.govee_thermometer_nursery_h5075_temperature
        below: 66
      sequence:
      - action: notify.mobile_app_andrews_s24
        data:
          title: Nursery Alert
          message: 'Nursery temperature is below 66°F (current: {{ states(''sensor.govee_thermometer_nursery_h5075_temperature'')
            }}).

            '
          data:
            ttl: 0
            priority: high
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.nursery_alert_cooldown
      - delay:
          minutes: 30
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.nursery_alert_cooldown
