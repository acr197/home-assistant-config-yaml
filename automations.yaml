- id: '1762715716399'
  alias: 'Living Room: TV Play Lights Brightness Follow Room Brightness'
  description: Adjust TV Hue Play lights (Singapore scene) based on Living Room brightness.
  triggers:
  - trigger: state
    entity_id: light.living_room
    to: 'on'
  - trigger: state
    entity_id: light.living_room
    to: 'off'
  - trigger: numeric_state
    entity_id:
    - light.hue_color_lamp_living_room_1
    attribute: brightness
    above: 69
    for:
      seconds: 2
  - trigger: numeric_state
    entity_id:
    - light.hue_color_lamp_living_room_1
    attribute: brightness
    below: 70
    for:
      seconds: 2
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: state
        entity_id: light.living_room
        state: 'off'
      sequence:
      - action: scene.turn_on
        target:
          entity_id: scene.tv_play_lights_singapore
        data:
          transition: 2
      - action: light.turn_on
        target:
          entity_id: light.tv_play_lights
        data:
          brightness_pct: 5
          transition: 2
    - conditions:
      - condition: state
        entity_id: light.living_room
        state: 'on'
      - condition: numeric_state
        entity_id: light.hue_color_lamp_living_room_1
        attribute: brightness
        below: 70
      sequence:
      - action: scene.turn_on
        target:
          entity_id: scene.tv_play_lights_singapore
        data:
          transition: 2
      - action: light.turn_on
        target:
          entity_id: light.tv_play_lights
        data:
          brightness_pct: 30
          transition: 2
    default:
    - condition: state
      entity_id: light.living_room
      state: 'on'
    - action: scene.turn_on
      target:
        entity_id: scene.tv_play_lights_singapore
      data:
        transition: 2
    - action: light.turn_on
      target:
        entity_id: light.tv_play_lights
      data:
        transition: 2
        brightness_pct: 75
  mode: restart
